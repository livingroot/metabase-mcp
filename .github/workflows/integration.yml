name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Lint (no-console check)
        run: npm run lint

      - name: Start Metabase
        run: docker compose up -d --wait
        # --wait requires Docker Compose v2.1+ (available on ubuntu-latest).
        # Waits for the healthcheck defined in docker-compose.yml (start_period: 120s)
        # before returning — prevents race between container ready and test start.

      - name: Run integration tests
        run: npm run test:integration
        env:
          METABASE_URL: http://localhost:3000
          INTEGRATION: "true"
          # METABASE_API_KEY intentionally NOT set:
          # globalSetup.integration.ts creates a fresh key from the new container
          # and injects it into test workers via project.provide().

      - name: Stop Metabase
        if: always()
        run: docker compose down -v
        # -v removes volumes so the next run starts from a clean H2 state.
